<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office - Isometric Pivot</title>
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* UI Overlay Styles (Rescued from Manuel) */
    #ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    
    #ui-layer > * { pointer-events: auto; }

    #top-bar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(13, 17, 23, 0.9);
      border-bottom: 1px solid #21262d;
      backdrop-filter: blur(10px);
    }
    
    #zone-display { display: flex; align-items: center; gap: 10px; }
    #zone-indicator { width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; }
    #zone-name { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #3b82f6; }
    
    #login-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      gap: 20px;
      z-index: 100;
    }
    
    #login-screen h1 {
      font-size: 48px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    #name-input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      width: 280px;
      outline: none;
    }
    
    .avatar-selector {
      display: flex;
      gap: 24px;
      background: #161b22;
      padding: 20px;
      border: 1px solid #30363d;
      border-radius: 8px;
      align-items: center;
      width: 280px;
    }
    
    #join-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    #game-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="ui-layer">
    <div id="login-screen">
      <h1>THE OFFICE</h1>
      <input type="text" id="name-input" placeholder="Your name" maxlength="20">
      <div class="avatar-selector">
        <div id="color-wheel"></div>
      </div>
      <button id="join-btn">ENTER</button>
    </div>

    <div id="game-ui" style="display: none;">
      <div id="top-bar">
        <div id="zone-display">
          <div id="zone-indicator"></div>
          <span id="zone-name">CONNECTING...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="game-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
