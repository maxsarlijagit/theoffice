<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #app { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #hud { display: flex; justify-content: space-between; align-items: center; width: 800px; max-width: 95vw; }
    .badge { background: rgba(0,0,0,0.6); border: 1px solid #2a2a3a; padding: 5px 12px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #78e08f; }
    canvas { border: 2px solid #1a1a2a; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.8); image-rendering: pixelated; max-width: 95vw; }
    #chat-panel { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 480px; max-width: 92vw; display: flex; flex-direction: column; gap: 4px; transition: opacity 0.5s; }
    #chat-panel.hidden { opacity: 0; pointer-events: none; }
    #chat-log { background: rgba(0,0,0,0.85); border: 1px solid #2a2a3a; border-radius: 4px; padding: 6px 8px; max-height: 90px; overflow-y: auto; font-size: 11px; display: none; flex-direction: column; gap: 3px; }
    #chat-log.visible { display: flex; }
    .msg { padding: 2px 4px; }
    .msg.self b { color: #78e08f; }
    #chat-row { display: flex; gap: 4px; }
    #chat-txt { flex: 1; background: rgba(0,0,0,0.85); border: 1px solid #2a2a3a; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; font-family: 'Courier New', monospace; }
    #chat-txt:focus { border-color: #4a4a6a; outline: none; }
    #chat-btn { background: #e94560; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
    #login { position: absolute; inset: 0; background: rgba(10,10,20,0.97); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 14px; z-index: 100; }
    #login.hidden { display: none; }
    #login h1 { font-size: 28px; letter-spacing: 3px; text-transform: uppercase; }
    #login p { color: #555; font-size: 12px; }
    #name-input { background: #1a1a2a; border: 1px solid #2a2a3a; color: #fff; padding: 10px 16px; border-radius: 4px; font-size: 14px; width: 200px; text-align: center; font-family: 'Courier New', monospace; }
    #join-btn { background: #e94560; border: none; color: #fff; padding: 10px 28px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
    #join-btn:hover { background: #ff6b8a; }
    #hint { color: #333; font-size: 10px; }
    #status-menu { display: none; flex-direction: column; gap: 4px; padding: 8px; background: rgba(0,0,0,0.9); border: 1px solid #2a2a3a; border-radius: 4px; position: fixed; top: 52px; right: 20px; z-index: 300; }
    .status-opt { padding: 4px 10px; border-radius: 3px; cursor: pointer; text-align: center; font-size: 11px; }
    .status-opt:hover { opacity: 0.8; }
    #nearby-panel { position: fixed; top: 52px; left: 20px; background: rgba(0,0,0,0.9); border: 1px solid #2a2a3a; border-radius: 4px; padding: 8px; min-width: 140px; display: none; flex-direction: column; gap: 4px; }
    #nearby-panel.visible { display: flex; }
    #nearby-panel h4 { font-size: 10px; color: #555; }
    .nply { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .nply-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="badge">
        <span class="dot"></span>
        <span id="zone-name">OPEN OFFICE</span>
      </div>
      <div class="badge" id="my-status-badge" style="cursor:pointer">
        <span class="dot" style="background:#78e08f"></span>
        <span>DISPONIBLE</span>
      </div>
      <div class="badge" id="players-online">0 ONLINE</div>
      <button id="chat-toggle-btn" style="background:#0a0a14;border:1px solid #2a2a3a;color:#555;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer">💬 CHAT</button>
    </div>
    <canvas id="canvas" width="800" height="544"></canvas>
    <div id="nearby-panel"><h4>CERCA</h4></div>
    <div id="status-menu">
      <div class="status-opt" style="background:#78e08f;color:#000" data-s="available">DISPONIBLE</div>
      <div class="status-opt" style="background:#e17055;color:#fff" data-s="focus">EN FOCO</div>
      <div class="status-opt" style="background:#e94560;color:#fff" data-s="meeting">REUNIÓN</div>
      <div class="status-opt" style="background:#fdcb6e;color:#000" data-s="break">EN BREAK</div>
    </div>
    <div id="chat-panel">
      <div id="chat-log"></div>
      <div id="chat-row">
        <input type="text" id="chat-txt" placeholder="> mensaje..." maxlength="200" />
        <button id="chat-btn">ENV</button>
      </div>
    </div>
    <div id="login">
      <h1>THE OFFICE</h1>
      <p>Oficina virtual pixelart</p>
      <input type="text" id="name-input" placeholder="Tu nombre" maxlength="16" />
      <button id="join-btn">ENTRAR</button>
      <div id="hint">WASD / flechas para moverse</div>
    </div>
  </div>
  <script>
    /**
 * The Office - Client v3 (clean)
 */

const WS_URL = 'wss://theoffice-production.up.railway.app';
const TILE = 32, WORLD_W = 20, WORLD_H = 17, MOVE_MS = 55;

const STATUS_C = { available: '#78e08f', focus: '#e17055', meeting: '#e94560', break: '#fdcb6e' };
const STATUS_L = { available: 'DISPONIBLE', focus: 'EN FOCO', meeting: 'REUNIÓN', break: 'EN BREAK' };

const PALETTE = [
  { skin: '#f5c6a5', shirt: '#e94560', pants: '#2d2d4a', hair: '#3d2314' },
  { skin: '#8d5524', shirt: '#4a69bd', pants: '#1a1a2e', hair: '#0f0f0f' },
  { skin: '#f5c6a5', shirt: '#78e08f', pants: '#2d4a2d', hair: '#c4a35a' },
  { skin: '#c68642', shirt: '#9b59b6', pants: '#2d1b2d', hair: '#1a1a1a' },
  { skin: '#f5c6a5', shirt: '#e58e26', pants: '#3d2914', hair: '#6b4423' },
  { skin: '#8d5524', shirt: '#e74c3c', pants: '#2d1b1b', hair: '#2d1b1b' },
  { skin: '#f5c6a5', shirt: '#3498db', pants: '#1a1a2e', hair: '#7b3f00' },
  { skin: '#c68642', shirt: '#1abc9c', pants: '#16a085', hair: '#4a3800' },
];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// State
let ws, myId = null, myPalette = 0, mySession = null;
let players = {}, zones = {}, tileMaps = {};
let chatMsgs = [], lastChatTs = 0;
let connected = false, chatFocused = false, lastMove = 0;
let nearbyPlayers = [];
const keys = {};

// Connection
function connect() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  ws = new WebSocket(WS_URL);
  
  ws.onopen = () => {
    connected = true;
    // Only reconnect if we have a session ID and were previously joined
      ws.send(JSON.stringify({ type: 'reconnect', data: { sessionId: mySession } }));
    }
  };
  
  ws.onmessage = e => handle(JSON.parse(e.data));
  
  ws.onclose = () => {
    connected = false;
    if (mySession) setTimeout(connect, 3000);
  };
  
  ws.onerror = () => {};
}

function send(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type, data }));
  }
}

function handle(msg) {
  const { type, data } = msg;
  switch (type) {
    case 'welcome':
      myId = data.playerId;
      myPalette = data.paletteIdx !== undefined ? data.paletteIdx : 0;
      mySession = data.sessionId;
      localStorage.setItem('theoffice_session', data.sessionId);
      players = data.world || {};
      zones = data.zones || {};
      tileMaps = {};
      for (const [z, zone] of Object.entries(zones)) tileMaps[z] = zone.tiles || [];
      document.getElementById('login').classList.add('hidden');
      document.getElementById('players-online').textContent = Object.keys(players).length;
      break;
    case 'reconnected':
      myId = data.playerId;
      mySession = data.sessionId;
      players = data.world || {};
      zones = data.zones || {};
      tileMaps = {};
      for (const [z, zone] of Object.entries(zones)) tileMaps[z] = zone.tiles || [];
      document.getElementById('login').classList.add('hidden');
      break;
    case 'player-joined':
      players[data.id] = data;
      document.getElementById('players-online').textContent = Object.keys(players).length;
      break;
    case 'player-left':
      delete players[data.playerId];
      document.getElementById('players-online').textContent = Object.keys(players).length;
      break;
    case 'player-moved':
      if (players[data.playerId]) {
        players[data.playerId].x = data.x;
        players[data.playerId].y = data.y;
        if (data.zone) players[data.playerId].zone = data.zone;
        if (data.facing !== undefined) players[data.playerId].facing = data.facing;
      }
      break;
    case 'player-status':
      if (players[data.playerId]) players[data.playerId].status = data.status;
      break;
    case 'nearby':
      nearbyPlayers = data.players;
      break;
    case 'chat':
      chatMsgs.push(data);
      if (chatMsgs.length > 20) chatMsgs.shift();
      lastChatTs = Date.now();
      showChat();
      renderChat();
      scheduleChatHide();
      break;
  }
}

// Show/hide chat
function showChat() { document.getElementById('chat-panel').classList.remove('hidden'); }
function scheduleChatHide() { setTimeout(() => { document.getElementById('chat-panel').classList.add('hidden'); }, 6000); }
function renderChat() {
  const el = document.getElementById('chat-log');
  el.innerHTML = chatMsgs.slice(-8).map(m => {
    const isSelf = m.fromId === myId;
    return `<div class="msg${isSelf?' self':''}"><b>${m.from}:</b> ${m.text}${!isSelf?' '+m.audioLevel+'':''}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// Input
document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('chat-txt')) return;
  keys[e.key] = true;
});
document.addEventListener('keyup', e => {
  if (e.target === document.getElementById('chat-txt')) return;
  keys[e.key] = false;
});
document.getElementById('chat-txt').addEventListener('focus', () => chatFocused = true);
document.getElementById('chat-txt').addEventListener('blur', () => chatFocused = false);

// Update
function update() {
  if (!myId || !players[myId] || chatFocused) return;
  const me = players[myId];
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w'] || keys['arrowup']) dy = -1;
  if (keys['ArrowDown'] || keys['s'] || keys['arrowdown']) dy = 1;
  if (keys['ArrowLeft'] || keys['a'] || keys['arrowleft']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['arrowright']) dx = 1;
  
  if (dx === 0 && dy === 0) return;
  
  const now = Date.now();
  if (now - lastMove < MOVE_MS) return;
  
  const nx = dx > 0 ? Math.min(WORLD_W - 1, me.x + 1) : dx < 0 ? Math.max(0, me.x - 1) : Math.round(me.x);
  const ny = dy > 0 ? Math.min(WORLD_H - 1, me.y + 1) : dy < 0 ? Math.max(0, me.y - 1) : Math.round(me.y);
  
  if (nx !== me.x || ny !== me.y) {
    console.log("SEND MOVE:", {x: nx, y: ny, readyState: ws.readyState}); // Optimistic update: move locally immediately
      players[myId].x = nx;
      players[myId].y = ny;
      send('move', { x: nx, y: ny });
    lastMove = now;
  }
}

// Render
function drawTile(type, x, y) {
  const px = x * TILE, py = y * TILE;
  switch (type) {
    case 1:
      ctx.fillStyle = '#3d2914'; ctx.fillRect(px + 2, py + 22, 28, 8);
      ctx.fillStyle = '#4a69bd'; ctx.fillRect(px + 8, py + 8, 16, 14);
      break;
    case 2:
      ctx.fillStyle = '#2d5a1a'; ctx.beginPath(); ctx.ellipse(px + 16, py + 14, 10, 10, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#4a3020'; ctx.fillRect(px + 12, py + 24, 8, 6);
      break;
    case 3:
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + 8, py + 8, 16, 12);
      ctx.fillStyle = '#6a89cc'; ctx.fillRect(px + 12, py + 11, 8, 5);
      break;
    case 4:
      ctx.fillStyle = '#2d2d4a'; ctx.fillRect(px + 10, py + 18, 12, 8);
      ctx.fillStyle = '#4a4a6a'; ctx.fillRect(px + 8, py + 8, 16, 12);
      break;
    case 5:
      ctx.fillStyle = '#3d5a3d'; ctx.fillRect(px + 2, py + 2, 28, 28);
      break;
    case 6:
      ctx.fillStyle = '#1a2a4a'; ctx.fillRect(px + 4, py + 4, 24, 56);
      ctx.fillStyle = '#e94560'; ctx.fillRect(px + 10, py + 10, 6, 6);
      ctx.fillStyle = '#4a69bd'; ctx.fillRect(px + 18, py + 10, 6, 6);
      break;
  }
}

function drawPlayer(px, py, pal, status, frame, facing, isMe) {
  const p = PALETTE[pal % PALETTE.length];
  const bob = frame % 2 === 1 ? -1 : 0;
  
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(px + 16, py + 30, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
  
  if (isMe) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(px + 16, py + 18 + bob, 18, 0, Math.PI * 2); ctx.stroke();
  }
  
  ctx.fillStyle = p.pants;
  ctx.fillRect(px + 10 + (frame % 2), py + 22 + bob, 4, 8);
  ctx.fillRect(px + 18 - (frame % 2), py + 22 + bob, 4, 8);
  
  ctx.fillStyle = p.shirt;
  ctx.fillRect(px + 8, py + 12 + bob, 16, 12);
  
  ctx.fillStyle = p.skin;
  ctx.fillRect(px + 10, py + 4 + bob, 12, 10);
  
  ctx.fillStyle = p.hair;
  ctx.fillRect(px + 10, py + 2 + bob, 12, 5);
  
  ctx.fillStyle = STATUS_C[status] || STATUS_C.available;
  ctx.beginPath(); ctx.arc(px + 22, py + 6 + bob, 3, 0, Math.PI * 2); ctx.fill();
}

function render() {
  const me = players[myId];
  const zone = me?.zone || 'open-office';
  const z = zones[zone] || { bgColor: '#0d1b2a', floorColor: '#1b263b' };
  
  ctx.fillStyle = z.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let y = 0; y < WORLD_H; y++) {
    for (let x = 0; x < WORLD_W; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? z.floorColor : z.floorColor + '44';
      ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
    }
  }
  
  for (const [zName, zd] of Object.entries(zones)) {
    ctx.fillStyle = zd.bgColor + '22';
    ctx.fillRect(zd.x * TILE, zd.y * TILE, zd.width * TILE, zd.height * TILE);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 2;
    ctx.strokeRect(zd.x * TILE, zd.y * TILE, zd.width * TILE, zd.height * TILE);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.font = 'bold 10px monospace';
    ctx.fillText(zName.replace('-', ' ').toUpperCase(), zd.x * TILE + 8, zd.y * TILE + 14);
    
    const tiles = tileMaps[zName];
    if (tiles) {
      for (let ty = 0; ty < tiles.length; ty++) {
        for (let tx = 0; tx < (tiles[ty]?.length || 0); tx++) {
          if (tiles[ty][tx] > 0) drawTile(tiles[ty][tx], zd.x + tx, zd.y + ty);
        }
      }
    }
  }
  
  const sorted = Object.entries(players).sort((a, b) => a[1].y - b[1].y);
  for (const [id, p] of sorted) {
    const px = p.x * TILE, py = p.y * TILE;
    const isMe = id === myId;
    
    if (!isMe && me) {
      const dist = Math.sqrt((p.x - me.x) ** 2 + (p.y - me.y) ** 2);
      if (dist <= 3) {
        ctx.strokeStyle = `rgba(255,255,255,${0.1 * (1 - dist / 3)})`;
        ctx.beginPath(); ctx.arc(px + 16, py + 18, 20, 0, Math.PI * 2); ctx.stroke();
      }
    }
    
    drawPlayer(px, py, p.paletteIdx || 0, p.status || 'available', p.frame || 0, p.facing || 1, isMe);
    
    ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.8)';
    ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.name, px + 16, py + 38);
  }
  
  // Zone HUD
  if (me) {
    document.getElementById('zone-name').textContent = (me.zone || 'open-office').replace('-', ' ').toUpperCase();
    const status = me.status || 'available';
    const dot = document.querySelector('#my-status-badge .dot');
    dot.style.background = STATUS_C[status];
    document.querySelector('#my-status-badge span').textContent = STATUS_L[status];
  }
  
  requestAnimationFrame(render);
}

// Chat
document.getElementById('chat-btn').addEventListener('click', () => {
  const t = document.getElementById('chat-txt').value.trim();
  if (t && connected) { send('chat', { text: t }); document.getElementById('chat-txt').value = ''; }
});
document.getElementById('chat-txt').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('chat-btn').click(); } e.stopPropagation(); });

// Chat toggle button
document.getElementById('chat-toggle-btn').addEventListener('click', () => {
  showChat();
  document.getElementById('chat-txt').focus();
});

// Status
document.getElementById('my-status-badge').addEventListener('click', () => {
  const el = document.getElementById('status-menu');
  el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
});
document.querySelectorAll('.status-opt').forEach(el => {
  el.addEventListener('click', () => {
    if (connected) send('status', { status: el.dataset.s });
    document.getElementById('status-menu').style.display = 'none';
  });
});

// Join
document.getElementById('join-btn').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim() || 'Player';
  mySession = localStorage.getItem('theoffice_session');
  if (!connected) connect();
  else send('join', { name, sessionId: mySession });
});

// Init
mySession = localStorage.getItem('theoffice_session');
connect();
setInterval(update, 1000 / 60);
console.log("CLIENT v3 LOADED"); render();
  </script>
</body>
</html>
