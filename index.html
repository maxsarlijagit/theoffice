<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    #app {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 800px;
      max-width: 95vw;
    }
    .hud-item {
      background: #0a0a14;
      border: 1px solid #2a2a3a;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-green { background: #78e08f; }
    .dot-red { background: #e94560; }
    .dot-orange { background: #e17055; }
    .dot-yellow { background: #fdcb6e; }
    #canvas {
      border: 2px solid #1a1a2a;
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      image-rendering: pixelated;
      max-width: 95vw;
    }
    #chat-panel {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: opacity 0.5s;
    }
    #chat-panel.hidden { opacity: 0; pointer-events: none; }
    #chat-log {
      background: rgba(0,0,0,0.85);
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      padding: 6px 8px;
      max-height: 100px;
      overflow-y: auto;
      font-size: 11px;
      display: none;
      flex-direction: column;
      gap: 3px;
    }
    #chat-log.visible { display: flex; }
    .msg { padding: 2px 4px; border-radius: 2px; }
    .msg-loud { background: rgba(233,69,96,0.15); }
    .msg-self { background: rgba(120,224,143,0.1); }
    .msg .nm { font-weight: bold; margin-right: 4px; }
    .msg .tx { color: #aaa; }
    .msg .vol { font-size: 9px; margin-left: 3px; }
    #chat-row {
      display: flex;
      gap: 4px;
    }
    #chat-txt {
      flex: 1;
      background: rgba(0,0,0,0.85);
      border: 1px solid #2a2a3a;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    #chat-txt:focus { border-color: #4a4a6a; outline: none; }
    #chat-send {
      background: #e94560;
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
    }
    #login {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.97);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      z-index: 100;
    }
    #login.hidden { display: none; }
    #login h1 { font-size: 32px; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
    #login p { color: #555; font-size: 12px; }
    #login input {
      background: #1a1a2a;
      border: 1px solid #2a2a3a;
      color: #fff;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
      width: 200px;
      font-family: 'Courier New', monospace;
    }
    #login button {
      background: #e94560;
      border: none;
      color: #fff;
      padding: 10px 28px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
    }
    #login button:hover { background: #ff6b8a; }
    #status-panel {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 300;
      background: rgba(0,0,0,0.9);
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    #status-panel.visible { display: flex; }
    .sopt {
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .sopt:hover { opacity: 0.8; }
    #nearby-panel {
      position: absolute;
      top: 44px;
      left: 20px;
      background: rgba(0,0,0,0.9);
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      padding: 8px;
      min-width: 150px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    #nearby-panel.visible { display: flex; }
    #nearby-panel h4 { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
    .nply { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .nply .clr { width: 8px; height: 8px; border-radius: 50%; }
    #hint { color: #333; font-size: 10px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="hud-item" id="zone-hud">
        <span class="dot dot-green"></span>
        <span>OPEN OFFICE</span>
      </div>
      <div class="hud-item" id="my-status" style="cursor:pointer">
        <span class="dot dot-green"></span>
        <span>DISPONIBLE</span>
      </div>
      <div class="hud-item" id="count-hud">0 ONLINE</div>
      <button id="chat-toggle" style="background:#0a0a14;border:1px solid #2a2a3a;color:#555;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;display:inline;vertical-align:middle">💬</button>
    </div>
    <canvas id="canvas" width="800" height="544"></canvas>
    <div id="nearby-panel">
      <h4>Cerca</h4>
    </div>
    <div id="toast" style="position:absolute;top:50px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a3a;padding:6px 16px;border-radius:4px;font-size:12px;display:none;z-index:200;"></div>
    <div id="status-panel" style="display:none;flex-direction:column;gap:4px;padding:8px;background:rgba(0,0,0,0.9);border:1px solid #2a2a3a;border-radius:4px;position:fixed;top:60px;right:20px;z-index:300;">
      <div class="sopt" style="background:#78e08f;color:#000;padding:4px 10px;border-radius:3px;cursor:pointer;text-align:center;font-size:11px;" data-s="available">DISPONIBLE</div>
      <div class="sopt" style="background:#e17055;color:#fff;padding:4px 10px;border-radius:3px;cursor:pointer;text-align:center;font-size:11px;" data-s="focus">EN FOCO</div>
      <div class="sopt" style="background:#e94560;color:#fff;padding:4px 10px;border-radius:3px;cursor:pointer;text-align:center;font-size:11px;" data-s="meeting">REUNIÓN</div>
      <div class="sopt" style="background:#fdcb6e;color:#000;padding:4px 10px;border-radius:3px;cursor:pointer;text-align:center;font-size:11px;" data-s="break">EN BREAK</div>
    </div>
    <div id="chat-panel">
      <div id="chat-log"></div>
      <div id="chat-row">
        <input type="text" id="chat-txt" placeholder="> mensaje..." maxlength="200" />
        <button id="chat-send">ENV</button>
      </div>
    </div>
    <div id="login">
      <h1>THE OFFICE</h1>
      <p>Oficina virtual pixelart — movete con WASD</p>
      <input type="text" id="login-name" placeholder="Tu nombre" maxlength="16" />
      <button id="login-btn">ENTRAR</button>
      <div id="hint">WASD / ↑↓←→ • Status clickeable</div>
    </div>
  </div>

  <script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const TILE = 32;
const WORLD_W = 20;
const WORLD_H = 17;
const MOVE_MS = 55;
const CHAT_HIDE_MS = 5000;

const WS_URL = 'wss://theoffice-production.up.railway.app';
const STATUS_C = { available: '#78e08f', focus: '#e17055', meeting: '#e94560', break: '#fdcb6e' };
const STATUS_L = { available: 'DISPONIBLE', focus: 'EN FOCO', meeting: 'REUNIÓN', break: 'EN BREAK' };

// Pixelart palette
const PALETTE = [
  { skin: '#f5c6a5', shirt: '#e94560', pants: '#2d2d4a', hair: '#3d2314' },
  { skin: '#8d5524', shirt: '#4a69bd', pants: '#1a1a2e', hair: '#0f0f0f' },
  { skin: '#f5c6a5', shirt: '#78e08f', pants: '#2d4a2d', hair: '#c4a35a' },
  { skin: '#c68642', shirt: '#9b59b6', pants: '#2d1b2d', hair: '#1a1a1a' },
  { skin: '#f5c6a5', shirt: '#e58e26', pants: '#3d2914', hair: '#6b4423' },
  { skin: '#8d5524', shirt: '#e74c3c', pants: '#2d1b1b', hair: '#2d1b1b' },
  { skin: '#f5c6a5', shirt: '#3498db', pants: '#1a1a2e', hair: '#7b3f00' },
  { skin: '#c68642', shirt: '#1abc9c', pants: '#16a085', hair: '#4a3800' },
];

// Tile sprites (pixelart)
function drawTile(type, x, y) {
  const px = x * TILE, py = y * TILE;
  switch(type) {
    case 1: // desk
      ctx.fillStyle = '#3d2914';
      ctx.fillRect(px+2, py+22, 28, 8);
      ctx.fillStyle = '#5a3d1a';
      ctx.fillRect(px+4, py+24, 24, 4);
      ctx.fillStyle = '#2d1f0f';
      ctx.fillRect(px+8, py+8, 16, 14);
      ctx.fillStyle = '#4a69bd';
      ctx.fillRect(px+10, py+10, 12, 8);
      ctx.fillStyle = '#6a89cc';
      ctx.fillRect(px+12, py+11, 8, 5);
      break;
    case 2: // plant
      ctx.fillStyle = '#2d5a1a';
      ctx.beginPath();
      ctx.ellipse(px+16, py+14, 10, 10, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#3d7a2a';
      ctx.beginPath();
      ctx.ellipse(px+20, py+10, 7, 7, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#4a3020';
      ctx.fillRect(px+12, py+24, 8, 6);
      ctx.fillStyle = '#5a3d28';
      ctx.fillRect(px+13, py+25, 6, 4);
      break;
    case 3: // computer
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(px+8, py+8, 16, 12);
      ctx.fillStyle = '#4a69bd';
      ctx.fillRect(px+10, py+10, 12, 8);
      ctx.fillStyle = '#6a89cc';
      ctx.fillRect(px+12, py+11, 8, 5);
      ctx.fillStyle = '#3d3d5a';
      ctx.fillRect(px+8, py+20, 16, 6);
      ctx.fillStyle = '#2d2d4a';
      ctx.fillRect(px+14, py+26, 4, 4);
      break;
    case 4: // chair
      ctx.fillStyle = '#2d2d4a';
      ctx.fillRect(px+10, py+18, 12, 8);
      ctx.fillStyle = '#4a4a6a';
      ctx.fillRect(px+8, py+8, 16, 12);
      ctx.fillStyle = '#3d3d5a';
      ctx.fillRect(px+10, py+26, 12, 4);
      break;
    case 5: // table (cafeteria)
      ctx.fillStyle = '#3d5a3d';
      ctx.fillRect(px+2, py+2, 28, 28);
      ctx.fillStyle = '#4a6b4a';
      ctx.fillRect(px+6, py+6, 20, 20);
      ctx.fillStyle = '#2d4a2d';
      ctx.fillRect(px+14, py+14, 4, 4);
      break;
    case 6: // arcade machine
      ctx.fillStyle = '#1a2a4a';
      ctx.fillRect(px+4, py+4, 24, 56);
      ctx.fillStyle = '#0f1f3a';
      ctx.fillRect(px+6, py+6, 20, 24);
      ctx.fillStyle = '#e94560';
      ctx.fillRect(px+10, py+10, 6, 6);
      ctx.fillStyle = '#4a69bd';
      ctx.fillRect(px+18, py+10, 6, 6);
      ctx.fillStyle = '#e58e26';
      ctx.fillRect(px+10, py+20, 4, 4);
      ctx.fillStyle = '#78e08f';
      ctx.fillRect(px+18, py+20, 4, 4);
      ctx.fillStyle = '#2a3a5a';
      ctx.fillRect(px+8, py+32, 16, 24);
      break;
  }
}

// Draw pixelart player
function drawPlayer(px, py, colorIdx, status, frame, facing, isMe) {
  const pal = PALETTE[colorIdx % PALETTE.length];
  
  // Walk animation offset
  const bobY = frame % 2 === 1 ? -1 : 0;
  const legOffset = frame % 2 === 1 ? 1 : -1;
  
  const cx = px + 16, cy = py + 16;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, py+30, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Self indicator glow
  if (isMe) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy+bobY, 20, 0, Math.PI*2);
    ctx.stroke();
  }
  
  // Legs
  ctx.fillStyle = pal.pants;
  ctx.fillRect(cx-5+legOffset, py+22+bobY, 4, 8);
  ctx.fillRect(cx+1-legOffset, py+22+bobY, 4, 8);
  
  // Body
  ctx.fillStyle = pal.shirt;
  ctx.fillRect(cx-6, py+12+bobY, 12, 12);
  
  // Body detail (shirt stripe)
  ctx.fillStyle = pal.shirt + 'cc';
  ctx.fillRect(cx-6, py+16+bobY, 12, 3);
  
  // Arms
  ctx.fillStyle = pal.skin;
  ctx.fillRect(cx-8, py+14+bobY, 3, 8);
  ctx.fillRect(cx+5, py+14+bobY, 3, 8);
  
  // Head
  ctx.fillStyle = pal.skin;
  ctx.fillRect(cx-5, py+4+bobY, 10, 9);
  
  // Hair
  ctx.fillStyle = pal.hair;
  ctx.fillRect(cx-5, py+2+bobY, 10, 4);
  if (facing > 0) {
    ctx.fillRect(cx+2, py+2+bobY, 4, 3);
  } else {
    ctx.fillRect(cx-6, py+2+bobY, 4, 3);
  }
  
  // Eyes (direction based)
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-3+(facing>0?2:0), py+7+bobY, 2, 2);
  ctx.fillRect(cx+1+(facing>0?2:0), py+7+bobY, 2, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(cx-3+(facing>0?3:0), py+7+bobY, 1, 2);
  ctx.fillRect(cx+1+(facing>0?3:0), py+7+bobY, 1, 2);
  
  // Status dot
  ctx.fillStyle = STATUS_C[status] || STATUS_C.available;
  ctx.beginPath();
  ctx.arc(cx+7, py+4+bobY, 3, 0, Math.PI*2);
  ctx.fill();
  
  // Name
  ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.75)';
  ctx.font = 'bold 9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('', px+16, py+36);
}

let ws, myId, myColorIdx = 0, mySessionId = null, reconnectAttempts = 0, wasConnected = false;
let players = {}, zones = {}, tileMaps = {};
let chatMsgs = [], lastChatTs = 0;
let connected = false, chatFocused = false;
let lastMove = 0;
let nearbyPlayers = [];

const keys = {};
let debugKeyCount = 0;
document.addEventListener('keydown', e => {
  if (e.target === document.getElementById('chat-txt')) return;
  keys[e.key] = true; keys[e.key.toLowerCase()] = true;
  debugKeyCount++;
  if (debugKeyCount % 100 === 1) console.log("keydown:", e.key, "chatFocused:", chatFocused, "myId:", myId);
});
document.addEventListener('keyup', e => {
  if (e.target === document.getElementById('chat-txt')) return;
  keys[e.key] = false; keys[e.key.toLowerCase()] = false;
});
document.getElementById('chat-txt').addEventListener('focus', () => chatFocused = true);
document.getElementById('chat-txt').addEventListener('blur', () => chatFocused = false);

function showToast(msg, duration = 3000) { const t = document.getElementById("toast"); if (!t) return; t.textContent = msg; t.style.display = "block"; setTimeout(() => { t.style.display = "none"; }, duration); }

function connect() {
  ws = new WebSocket(WS_URL);
  setCount('...');
  ws.onopen = () => { connected = true; wasConnected = true; reconnectAttempts = 0; setCount(Object.keys(players).length); if (mySessionId) { send('reconnect', { sessionId: mySessionId }); } else { /* waiting */ }; };
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => { connected = false; setCount('...'); setTimeout(connect, 3000); };
}
function send(t, d) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: t, data: d })); }

function handle(msg) {
  const { type, data } = msg;
  switch (type) {
    case "error":
      showToast(data.message || "Error");
      break;
    case 'welcome':
      myId = data.playerId;
      myColorIdx = data.paletteIdx !== undefined ? data.paletteIdx : 0;
      players = data.world;
      zones = data.zones;
      tileMaps = {};
      for (const [zName, zone] of Object.entries(zones)) {
        tileMaps[zName] = zone.tiles || [];
      }
      document.getElementById('login').classList.add('hidden');
      setCount(Object.keys(players).length);
      break;
    case 'player-joined': players[data.id] = data; setCount(Object.keys(players).length); break;
    case 'player-left': delete players[data.playerId]; setCount(Object.keys(players).length); break;
    case 'player-moved':
      if (players[data.playerId]) {
        players[data.playerId].x = data.x;
        players[data.playerId].y = data.y;
        if (data.zone) players[data.playerId].zone = data.zone;
        if (data.facing) players[data.playerId].facing = data.facing;
      }
      break;
    case 'player-status':
      if (players[data.playerId]) players[data.playerId].status = data.status;
      break;
    case 'player-animated':
      if (players[data.playerId]) players[data.playerId].frame = data.frame;
      break;
    case 'nearby':
      nearbyPlayers = data.players;
      updateNearby();
      break;
    case 'chat':
      chatMsgs.push(data);
      if (chatMsgs.length > 30) chatMsgs.shift();
      lastChatTs = Date.now();
      showChat(); renderChat();
      break;
  }
  updateHUD();
}

function setCount(n) {
  document.getElementById('count-hud').textContent = typeof n === 'number' ? `${n} ONLINE` : n;
  if (typeof n === 'number' && n >= 0) requestAnimationFrame(() => {}); // refresh
}

function updateHUD() {
  const me = players[myId];
  const zone = me?.zone || 'open-office';
  const status = me?.status || 'available';
  
  document.getElementById('zone-hud').querySelector('span:last-child').textContent = zone.replace('-', ' ').toUpperCase();
  
  const statusEl = document.getElementById('my-status');
  statusEl.querySelector('span:last-child').textContent = STATUS_L[status];
  statusEl.querySelector('.dot').style.background = STATUS_C[status];
}

function showChat() {
  document.getElementById('chat-panel').classList.remove('hidden');
  setTimeout(() => {
    if (Date.now() - lastChatTs >= CHAT_HIDE_MS) {
      document.getElementById('chat-panel').classList.add('hidden');
    }
  }, CHAT_HIDE_MS + 1000);
}

function renderChat() {
  const el = document.getElementById('chat-log');
  el.innerHTML = chatMsgs.slice(-10).map(m => {
    const isSelf = m.fromId === myId;
    const isLoud = m.audioLevel >= 0.8;
    const vol = m.audioLevel >= 0.8 ? '🔊' : m.audioLevel >= 0.4 ? '🔉' : '🔈';
    const cls = isSelf ? 'self' : isLoud ? 'loud' : '';
    return `<div class="msg msg-${cls}"><span class="nm">${m.from}:</span><span class="tx">${m.text}</span>${!isSelf?`<span class="vol">${vol}</span>`:''}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
  el.className = chatMsgs.length > 0 ? 'visible' : '';
}

function updateNearby() {
  const el = document.getElementById('nearby-panel');
  el.className = nearbyPlayers.length > 0 ? 'visible' : '';
  if (nearbyPlayers.length === 0) return;
  let html = '<h4>Cerca</h4>';
  for (const p of nearbyPlayers) {
    const pl = players[p.id];
    if (!pl) continue;
    html += `<div class="nply"><span class="clr" style="background:${PALETTE[pl.paletteIdx%PALETTE.length].shirt}"></span><span>${p.name}</span><span style="color:${STATUS_C[p.status]||'#78e08f'};font-size:9px">●</span></div>`;
  }
  el.innerHTML = html;
}

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function update() {
  if (!myId || !players[myId] || chatFocused) { if (debugKeyCount % 50 === 1) console.log('update skip: myId=' + myId + ' players[myId]=' + (myId ? (players[myId] ? 'exists' : 'null') : 'no-myId') + ' chatFocused=' + chatFocused); return; }
  // Debug: log if keys are being captured
  const anyKey = Object.values(keys).some(v => v);
  if (anyKey && Math.random() < 0.01) console.log("keys pressed:", JSON.stringify(keys));
  const me = players[myId];
  const spd = 0.1;
  let dx = 0, dy = 0;
  if (keys['ArrowUp']||keys['w']||keys['W']) dy = -spd;
  if (keys['ArrowDown']||keys['s']||keys['S']) dy = spd;
  if (keys['ArrowLeft']||keys['a']||keys['A']) dx = -spd;
  if (keys['ArrowRight']||keys['d']||keys['D']) dx = spd;
  if (dx !== 0 || dy !== 0) {
    const now = Date.now();
    if (now - lastMove >= MOVE_MS) {
      const nx = clamp(me.x + (dx !== 0 ? Math.sign(dx) * 0.5 : 0), 0, WORLD_W-1); const ny = clamp(me.y + (dy !== 0 ? Math.sign(dy) * 0.5 : 0), 0, WORLD_H-1); console.log('MOVE attempt: me=' + JSON.stringify({x: me.x, y: me.y}) + ' dx=' + dx + ' dy=' + dy + ' nx=' + nx + ' ny=' + ny + ' connected=' + connected + ' ws.readyState=' + (ws ? ws.readyState : 'null')); if (nx !== me.x || ny !== me.y) send('move', { x: nx, y: ny });
      lastMove = now;
    }
  }
}

function render() {
  const me = players[myId];
  const zone = me?.zone || 'open-office';
  const z = zones[zone] || zones['open-office'] || { bgColor: '#0d1b2a', floorColor: '#1b263b' };
  
  // Background
  ctx.fillStyle = z.bgColor || '#0d1b2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Floor tiles (checkerboard pattern)
  const floorC1 = z.floorColor || '#1b263b';
  const floorC2 = (z.floorColor || '#1b263b') + '44';
  for (let y = 0; y < WORLD_H; y++) {
    for (let x = 0; x < WORLD_W; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? floorC1 : floorC2;
      ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
    }
  }
  
  // Zone dividers
  for (const [zName, zData] of Object.entries(zones)) {
    const { x, y, width, height, bgColor } = zData;
    ctx.fillStyle = bgColor + '22';
    ctx.fillRect(x*TILE, y*TILE, width*TILE, height*TILE);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x*TILE, y*TILE, width*TILE, height*TILE);
    
    // Zone label
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'left'; ctx.fillText(zName.replace('-', ' ').toUpperCase(), x*TILE+8, y*TILE+14); ctx.textAlign = 'center';
    
    // Draw tiles
    const tiles = tileMaps[zName];
    if (tiles) {
      for (let ty = 0; ty < tiles.length; ty++) {
        for (let tx = 0; tx < (tiles[ty]?.length || 0); tx++) {
          const tileType = tiles[ty][tx];
          if (tileType > 0) {
            drawTile(tileType, x + tx, y + ty);
          }
        }
      }
    }
  }
  
  // Players sorted by Y for depth
  const sorted = Object.entries(players).sort((a, b) => a[1].y - b[1].y);
  for (const [id, p] of sorted) {
    const isMe = id === myId;
    const frame = p.frame || 0;
    const facing = p.facing || 1;
    const palIdx = p.paletteIdx || 0;
    
    // Proximity ring
    if (!isMe && me) {
      const dist = Math.sqrt((p.x - me.x)**2 + (p.y - me.y)**2);
      if (dist <= 3) {
        const alpha = 0.15 * (1 - dist/3);
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x*TILE+16, p.y*TILE+18, 20, 0, Math.PI*2);
        ctx.stroke();
      }
    }
    
    drawPlayer(p.x*TILE, p.y*TILE, palIdx, p.status || 'available', frame, facing, isMe);
    
    // Name tag
    const px = p.x * TILE + 16;
    const py = p.y * TILE;
    ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.8)';
    ctx.font = isMe ? 'bold 9px Courier New' : '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, px, py + 36);
  }
  
  requestAnimationFrame(render);
}

// Chat
document.getElementById('chat-send').addEventListener('click', () => {
  const text = document.getElementById('chat-txt').value.trim();
  if (text && connected) { send('chat', { text }); document.getElementById('chat-txt').value = ''; }
});
document.getElementById('chat-txt').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('chat-send').click(); }
  e.stopPropagation();
});

// Status
document.getElementById('my-status').style.cursor = 'pointer'; document.getElementById('my-status').addEventListener('click', () => { const el = document.getElementById('status-panel');
  el.className = el.className === 'visible' ? '' : 'visible';
});
document.querySelectorAll('.sopt').forEach(el => {
  el.addEventListener('click', () => {
    if (connected) send('status', { status: el.dataset.s });
    else showToast('No conectado');
    const dot = document.querySelector('#my-status .dot');
    dot.style.background = STATUS_C[el.dataset.s];
    document.querySelector('#my-status span:last-child').textContent = STATUS_L[el.dataset.s];
    document.getElementById('status-panel').className = '';
    if (players[myId]) players[myId].status = el.dataset.s;
  });
});

document.getElementById('login-btn').addEventListener('click', () => {
  const name = document.getElementById('login-name').value.trim() || 'Player';
  if (connected) { send('join', { name: name, sessionId: localStorage.getItem('theoffice_session') }); } else { showToast('Conectando...'); if (!ws || ws.readyState !== WebSocket.OPEN) connect(); }
  document.getElementById('login-name').value = '';
});

document.getElementById('chat-toggle').addEventListener('click', () => { document.getElementById('chat-panel').classList.remove('hidden'); document.getElementById('chat-txt').focus(); });if (localStorage.getItem('theoffice_session')) { mySessionId = localStorage.getItem('theoffice_session'); }
connect();
setInterval(update, 1000/60);
render();
  </script>
