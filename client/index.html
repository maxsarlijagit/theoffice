<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(13, 17, 23, 0.9);
      border-bottom: 1px solid #21262d;
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    
    #zone-display { display: flex; align-items: center; gap: 10px; }
    #zone-indicator { width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; }
    #zone-name { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: #3b82f6; }
    #player-count { font-size: 14px; color: #8b949e; }
    
    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    #login-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      gap: 20px;
      z-index: 10;
    }
    
    #login-screen h1 {
      font-size: 48px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    #login-screen input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      width: 280px;
      outline: none;
    }
    
    #login-screen input:focus { border-color: #3b82f6; }
    
    #login-screen button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    #login-screen button:hover { background: #2563eb; }
    
    #chat-panel {
      position: fixed;
      right: 0;
      top: 60px;
      bottom: 0;
      width: 300px;
      background: rgba(13, 17, 23, 0.95);
      border-left: 1px solid #21262d;
      display: none;
      flex-direction: column;
    }
    
    #chat-panel.visible { display: flex; }
    
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .chat-message {
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #161b22;
      border-radius: 8px;
      font-size: 13px;
      word-wrap: break-word;
    }
    
    .chat-message .sender { font-weight: 600; margin-bottom: 2px; }
    .chat-message.global { border-left: 3px solid #f59e0b; }
    
    #chat-input-container { padding: 12px; border-top: 1px solid #21262d; }
    
    #chat-input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    
    #minimap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 120px;
      height: 80px;
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid #30363d;
      border-radius: 8px;
      image-rendering: pixelated;
    }
    
    #zone-notification {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: 600;
      color: white;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      transition: opacity 0.3s;
    }
    
    #zone-notification.visible { opacity: 1; }
    
    #chat-toggle {
      position: fixed;
      right: 20px;
      top: 70px;
      background: #21262d;
      border: none;
      color: #8b949e;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    
    #chat-toggle:hover { background: #30363d; }
  </style>
</head>
<body>
  <div id="top-bar">
    <div id="zone-display">
      <div id="zone-indicator"></div>
      <span id="zone-name">CONNECTING...</span>
    </div>
    <span id="player-count">0 online</span>
  </div>
  
  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
  </div>
  
  <div id="login-screen">
    <h1>THE OFFICE</h1>
    <input type="text" id="name-input" placeholder="Your name" maxlength="20">
    <button id="join-btn">ENTER</button>
  </div>
  
  <div id="chat-panel">
    <div id="chat-messages"></div>
    <div id="chat-input-container">
      <input type="text" id="chat-input" placeholder="Message...">
    </div>
  </div>
  
  <button id="chat-toggle">GLOBAL</button>
  <canvas id="minimap"></canvas>
  <div id="zone-notification"></div>

  <script type="module">
    import { generateAvatar, generateChair, generateMonitor, generatePlant, generateTable, generateFloorTile, generateWallTile, generateArcadeMachine } from './art/spriteGenerator.js';
    import { initAtmosphere, renderAtmosphere, isEnabled, setAtmosphere } from './art/atmosphere.js';

    const TILE_SIZE = 16;
    const CANVAS_WIDTH = 36 * TILE_SIZE;
    const CANVAS_HEIGHT = 22 * TILE_SIZE;

    // Zone colors
    const ZONE_COLORS = {
      OFFICE: '#3b82f6',
      FOCUS_ROOM: '#8b5cf6',
      CAFETERIA: '#f59e0b',
      ARCADE: '#ec4899',
      STUDIO: '#06b6d4',
    };

    // Sprite cache
    const sprites = {};
    let spritesReady = false;

    // Canvas setup
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    const minimap = document.getElementById('minimap');
    const minimapCtx = minimap.getContext('2d');
    minimap.width = 36;
    minimap.height = 22;

    // Game state
    let ws = null;
    let myId = null;
    let players = [];
    let tilemap = [];
    let zones = {};
    let currentZone = null;
    let pressedKeys = new Set();
    const chatBubbles = [];
    
    // Animation state
    let lastTime = 0;
    let frameIndex = 0;
    const frameDuration = 150; // ms per frame

    // Input handling
    const keyMap = {
      'KeyW': 'w', 'ArrowUp': 'w',
      'KeyS': 's', 'ArrowDown': 's',
      'KeyA': 'a', 'ArrowLeft': 'a',
      'KeyD': 'd', 'ArrowRight': 'd',
    };

    // Generate all sprites once
    const ZONE_SPRITE_KEY = {
      OFFICE: 'floorOffice',
      FOCUS_ROOM: 'floorFocus',
      CAFETERIA: 'floorCafeteria',
      ARCADE: 'floorArcade',
      STUDIO: 'floorStudio',
    };

    function generateSprites() {
      sprites.wall = generateWallTile();
      sprites.floorOffice = generateFloorTile('OFFICE');
      sprites.floorFocus = generateFloorTile('FOCUS_ROOM');
      sprites.floorCafeteria = generateFloorTile('CAFETERIA');
      sprites.floorArcade = generateFloorTile('ARCADE');
      sprites.floorStudio = generateFloorTile('STUDIO');
      sprites.chair = generateChair(0);
      sprites.monitor = generateMonitor(0);
      sprites.plant = generatePlant(0);
      sprites.table = generateTable('#065f46');
      sprites.arcade = generateArcadeMachine(0);
      spritesReady = true;
    }
    generateSprites();

    // Create avatar sprite for a player with animation
    function getAvatarSprite(color, seed, isMoving = false) {
      const key = `avatar_${color}_${isMoving ? frameIndex : 'idle'}`;
      if (!sprites[key]) {
        sprites[key] = generateAvatar(color, seed, isMoving ? frameIndex : 0);
      }
      return sprites[key];
    }

    document.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
      if (keyMap[e.code]) {
        e.preventDefault();
        pressedKeys.add(keyMap[e.code]);
        sendInput();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
      if (keyMap[e.code]) {
        pressedKeys.delete(keyMap[e.code]);
        sendInput();
      }
    });

    function sendInput() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const keys = Array.from(pressedKeys);
      ws.send(JSON.stringify({ type: 'input', keys }));
    }

    // Join game
    document.getElementById('join-btn').addEventListener('click', joinGame);
    document.getElementById('name-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinGame();
    });

    function joinGame() {
      const name = document.getElementById('name-input').value.trim() || 'Anonymous';
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'join',
          name: name,
          color: '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'),
        }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        console.log('Disconnected');
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'init':
          myId = msg.myId;
          players = msg.players;
          tilemap = msg.tilemap;
          zones = msg.zones;
          document.getElementById('login-screen').style.display = 'none';
          render();
          break;

        case 'state':
          players = msg.players;
          const me = players.find(p => p.id === myId);
          if (me && me.zone !== currentZone) {
            showZoneNotification(me.zone);
            currentZone = me.zone;
            updateZoneDisplay();
          }
          render();
          break;

        case 'player_joined':
          players.push(msg.player);
          break;

        case 'player_left':
          players = players.filter(p => p.id !== msg.playerId);
          break;

        case 'zone_enter':
          const entering = players.find(p => p.id === msg.playerId);
          if (entering) {
            entering.zone = msg.zone;
            if (entering.id === myId) {
              showZoneNotification(msg.zone);
              currentZone = msg.zone;
              updateZoneDisplay();
            }
          }
          break;

        case 'zone_leave':
          const leaving = players.find(p => p.id === msg.playerId);
          if (leaving) leaving.zone = msg.zone;
          break;

        case 'chat':
          if (msg.proximity) {
            chatBubbles.push({
              from: msg.from, color: msg.color, text: msg.message,
              x: msg.x, y: msg.y, timestamp: Date.now(), opacity: 1,
            });
          }
          if (msg.global) addChatMessage(msg.from, msg.color, msg.message, true);
          break;
      }

      document.getElementById('player-count').textContent = `${players.length} online`;
    }

    function updateZoneDisplay() {
      const color = ZONE_COLORS[currentZone] || '#3b82f6';
      document.getElementById('zone-name').textContent = currentZone || 'UNKNOWN';
      document.getElementById('zone-name').style.color = color;
      document.getElementById('zone-indicator').style.background = color;
    }

    function showZoneNotification(zone) {
      const notif = document.getElementById('zone-notification');
      notif.textContent = zone;
      notif.classList.add('visible');
      setTimeout(() => notif.classList.remove('visible'), 1500);
    }

    // Chat
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && ws && ws.readyState === WebSocket.OPEN) {
        const text = e.target.value.trim();
        if (text) {
          ws.send(JSON.stringify({ type: 'chat', message: text }));
          e.target.value = '';
        }
      }
    });

    document.getElementById('chat-toggle').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.toggle('visible');
    });

    function addChatMessage(sender, color, text, global) {
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-message' + (global ? ' global' : '');
      div.innerHTML = `<div class="sender" style="color:${color}">${sender}</div><div class="text">${text}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      while (container.children.length > 50) container.removeChild(container.firstChild);
    }

    // Render
    function render() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (!tilemap.length) return;

      // Draw tilemap with sprites
      for (let y = 0; y < tilemap.length; y++) {
        for (let x = 0; x < tilemap[y].length; x++) {
          const tile = tilemap[y][x];
          const px = x * TILE_SIZE;
          const py = y * TILE_SIZE;

          // Zone detection for floor
          let zoneName = 'OFFICE';
          for (const [name, z] of Object.entries(zones)) {
            if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) {
              zoneName = name;
              break;
            }
          }
          const floorSprite = sprites[ZONE_SPRITE_KEY[zoneName]] || sprites.floorOffice;

          // Draw based on tile type
          switch (tile) {
            case 0:
              ctx.drawImage(floorSprite, px, py);
              break;
            case 1:
              ctx.drawImage(sprites.wall, px, py);
              break;
            case 2:
              ctx.drawImage(floorSprite, px, py);
              ctx.drawImage(sprites.chair, px, py);
              break;
            case 3:
              ctx.drawImage(floorSprite, px, py);
              ctx.drawImage(sprites.monitor, px, py);
              break;
            case 4:
              ctx.drawImage(floorSprite, px, py);
              ctx.drawImage(sprites.plant, px, py);
              break;
            case 5:
              ctx.drawImage(floorSprite, px, py);
              ctx.drawImage(sprites.table, px, py);
              break;
            case 6: // Arcade machine
              ctx.drawImage(floorSprite, px, py);
              ctx.drawImage(sprites.arcade, px, py);
              break;
          }
        }
      }

      // Zone separators
      Object.entries(zones).forEach(([name, zone]) => {
        ctx.strokeStyle = ZONE_COLORS[name] + '40';
        ctx.lineWidth = 2;
        ctx.strokeRect(zone.x * TILE_SIZE, zone.y * TILE_SIZE, zone.w * TILE_SIZE, zone.h * TILE_SIZE);
      });

      renderChatBubbles();

      // Draw players with animated sprites
      players.forEach(player => {
        const px = player.x * TILE_SIZE;
        const py = player.y * TILE_SIZE;

        const isMoving = pressedKeys.size > 0 && player.id === myId;
        const avatar = getAvatarSprite(player.color, player.id.charCodeAt(0), isMoving);
        ctx.drawImage(avatar, px, py);

        // Name with outline
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.fillStyle = '#000000';
        ctx.fillText(player.name, px + 2, py - 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(player.name, px + 1, py - 3);
      });

      renderMinimap();
    }

    function renderChatBubbles() {
      const now = Date.now();
      for (let i = chatBubbles.length - 1; i >= 0; i--) {
        const b = chatBubbles[i];
        const age = now - b.timestamp;
        if (age > 4000) { chatBubbles.splice(i, 1); continue; }
        if (age > 2000) b.opacity = 1 - (age - 2000) / 2000;

        const px = b.x * TILE_SIZE;
        const py = b.y * TILE_SIZE - 20;

        ctx.font = '10px "Space Grotesk", sans-serif';
        const w = Math.min(ctx.measureText(b.text).width + 12, 80);
        ctx.fillStyle = `rgba(22, 27, 34, ${b.opacity * 0.9})`;
        ctx.beginPath();
        ctx.roundRect(px + 2 - w/2 + 8, py, w, 16, 4);
        ctx.fill();
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = `rgba(230, 237, 243, ${b.opacity})`;
        ctx.fillText(b.text.substring(0, 10), px + 6, py + 11);
      }
    }

    function renderMinimap() {
      minimapCtx.fillStyle = '#0d1117';
      minimapCtx.fillRect(0, 0, 36, 22);

      if (!tilemap.length) return;

      for (let y = 0; y < tilemap.length; y++) {
        for (let x = 0; x < tilemap[y].length; x++) {
          if (tilemap[y][x] > 0) {
            minimapCtx.fillStyle = '#334155';
            minimapCtx.fillRect(x, y, 1, 1);
          }
        }
      }

      players.forEach(p => {
        minimapCtx.fillStyle = p.color;
        minimapCtx.fillRect(p.x, p.y, 1, 1);
      });
    }

    // Heartbeat
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'heartbeat' }));
      }
    }, 10000);

    // Initialize atmosphere
    initAtmosphere();

    // Animation loop with atmosphere
    let lastFrameTime = 0;
    function animate(timestamp) {
      // Update animation frame every 150ms
      if (timestamp - lastTime > frameDuration) {
        frameIndex = (frameIndex + 1) % 4;
        lastTime = timestamp;
      }
      
      render();
      
      // Render atmosphere overlay
      if (isEnabled()) {
        renderAtmosphere(ctx, CANVAS_WIDTH, CANVAS_HEIGHT, currentZone, timestamp);
      }
      
      lastFrameTime = timestamp;
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
