<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 95vw;
    }
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 640px;
      max-width: 95vw;
      padding: 0 4px;
    }
    #zone-badge {
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #status {
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #78e08f;
    }
    .status-dot.offline { background: #eb5757; }
    #players-count {
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      backdrop-filter: blur(8px);
    }
    #chat-container {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #chat-messages {
      background: rgba(0,0,0,0.75);
      border-radius: 10px;
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    #chat-messages.visible { display: flex; }
    .chat-msg {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      word-break: break-word;
    }
    .chat-msg .name { font-weight: 600; margin-right: 4px; color: #fff; }
    .chat-msg .text { color: #ccc; }
    .chat-msg.self .name { color: #78e08f; }
    #chat-input-row {
      display: flex;
      gap: 6px;
    }
    #chat-input {
      flex: 1;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      backdrop-filter: blur(8px);
      outline: none;
    }
    #chat-input:focus { background: rgba(0,0,0,0.9); }
    #chat-send {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #e94560;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }
    #chat-send:hover { background: #ff6b8a; }
    #nearby-banner {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 11px;
      display: none;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #nearby-banner.visible { display: block; }
    #login-modal {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 15, 26, 0.97);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(8px);
    }
    #login-modal.hidden { display: none; }
    #login-modal h1 { font-size: 28px; font-weight: 700; }
    #login-modal p { color: #777; font-size: 13px; max-width: 360px; text-align: center; }
    #name-input {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 15px;
      width: 220px;
      text-align: center;
    }
    #join-btn {
      padding: 12px 36px;
      border-radius: 10px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #join-btn:hover { transform: scale(1.05); }
    #controls-hint { color: #555; font-size: 11px; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="top-bar">
      <div id="zone-badge">Open Office</div>
      <div id="status">
        <span class="status-dot"></span>
        <span>Conectando...</span>
      </div>
      <div id="players-count">👥 0 online</div>
    </div>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="nearby-banner">👥 Jugadores cerca</div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Escribe un mensaje..." maxlength="200" />
        <button id="chat-send">Enviar</button>
      </div>
    </div>
    <div id="login-modal">
      <h1>The Office</h1>
      <p>Tu oficina virtual dentro de Discord. Muate por las zonas y charlá con quienes estén cerca.</p>
      <input type="text" id="name-input" placeholder="Tu nombre" maxlength="16" />
      <button id="join-btn">Entrar</button>
      <div id="controls-hint">WASD o ↑↓←→ para moverse</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const TILE = 32;
    const MOVE_THROTTLE = 50; // ms between moves

    const WS_URL = 'wss://theoffice-production.up.railway.app';
    let ws = null;
    let myId = null;
    let myColor = '#e94560';
    let players = {};
    let zones = {};
    let chatMessages = [];
    let connected = false;
    let lastMove = 0;
    let chatFocused = false;

    // Input - only capture movement when chat is NOT focused
    const keys = {};
    document.addEventListener('keydown', e => {
      if (e.target === document.getElementById('chat-input')) return;
      keys[e.key] = true;
    });
    document.addEventListener('keyup', e => {
      if (e.target === document.getElementById('chat-input')) return;
      keys[e.key] = false;
    });

    // Chat focus state
    document.getElementById('chat-input').addEventListener('focus', () => { chatFocused = true; });
    document.getElementById('chat-input').addEventListener('blur', () => { chatFocused = false; });

    function connect() {
      ws = new WebSocket(WS_URL);
      setStatus('Conectando...', true);
      
      ws.onopen = () => {
        connected = true;
        setStatus('En línea', false);
      };
      ws.onmessage = e => handleMsg(JSON.parse(e.data));
      ws.onclose = () => {
        connected = false;
        setStatus('Reconectando...', true);
        setTimeout(connect, 3000);
      };
      ws.onerror = () => setStatus('Error', true);
    }

    function send(type, data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type, data }));
      }
    }

    function setStatus(text, offline) {
      document.querySelector('#status span:last-child').textContent = text;
      document.querySelector('.status-dot').className = 'status-dot' + (offline ? ' offline' : '');
    }

    function handleMsg(msg) {
      const { type, data } = msg;
      switch (type) {
        case 'welcome':
          myId = data.playerId;
          myColor = data.color;
          players = data.world;
          zones = data.zones;
          document.getElementById('login-modal').classList.add('hidden');
          break;
        case 'player-joined':
          players[data.id] = data;
          break;
        case 'player-left':
          delete players[data.id];
          break;
        case 'player-moved':
          if (players[data.playerId]) {
            players[data.playerId].x = data.x;
            players[data.playerId].y = data.y;
            if (data.zone) players[data.playerId].zone = data.zone;
          }
          break;
        case 'chat':
          chatMessages.push(data);
          if (chatMessages.length > 20) chatMessages.shift();
          renderChat();
          break;
      }
      updateUI();
    }

    function renderChat() {
      const el = document.getElementById('chat-messages');
      const myMsgs = chatMessages.filter(m => m.fromId === myId);
      el.innerHTML = chatMessages.slice(-10).map(m => {
        const isSelf = m.fromId === myId;
        return `<div class="chat-msg${isSelf ? ' self' : ''}"><span class="name">${m.from}:</span><span class="text">${m.text}</span></div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
      el.className = chatMessages.length > 0 ? 'visible' : '';
    }

    function updateUI() {
      const zone = players[myId]?.zone || 'open-office';
      document.getElementById('zone-badge').textContent = zone.replace('-', ' ');
      document.getElementById('players-count').textContent = `👥 ${Object.keys(players).length} online`;
      
      const me = players[myId];
      if (me) {
        let nearby = 0;
        for (const [id, p] of Object.entries(players)) {
          if (id === myId) continue;
          const dist = Math.sqrt((p.x - me.x)**2 + (p.y - me.y)**2);
          if (dist <= 3) nearby++;
        }
        const banner = document.getElementById('nearby-banner');
        banner.textContent = nearby > 0 ? `👥 ${nearby} jugador${nearby>1?'es':''} cerca` : '';
        banner.className = nearby > 0 ? 'visible' : '';
      }
    }

    function update() {
      if (!myId || !players[myId] || chatFocused) return;
      
      const me = players[myId];
      const speed = 0.1;
      let dx = 0, dy = 0;
      
      if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -speed;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = speed;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -speed;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = speed;
      
      if (dx !== 0 || dy !== 0) {
        const now = Date.now();
        if (now - lastMove >= MOVE_THROTTLE) {
          send('move', { x: me.x + dx, y: me.y + dy });
          lastMove = now;
        }
      }
    }

    function render() {
      const me = players[myId];
      const zone = me?.zone || 'open-office';
      const bgColor = zones[zone]?.bgColor || '#1a2a4a';
      
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for (let x = 0; x < canvas.width; x += TILE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += TILE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      
      // Zones
      for (const [name, zone] of Object.entries(zones)) {
        const { x, y, width, height, bgColor: zc } = zone;
        
        ctx.fillStyle = zc + '33';
        ctx.fillRect(x * TILE, y * TILE, width * TILE, height * TILE);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x * TILE, y * TILE, width * TILE, height * TILE);
        
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText(name.replace('-', ' ').toUpperCase(), x * TILE + 6, y * TILE + 14);
      }
      
      // Players
      for (const [id, p] of Object.entries(players)) {
        const px = p.x * TILE;
        const py = p.y * TILE;
        const isMe = id === myId;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px + 16, py + 30, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Self indicator (circle behind body, drawn first)
        if (isMe) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(px + 16, py + 16, 18, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        // Body (rectangle) - no stroke here
        ctx.fillStyle = p.color || '#e94560';
        ctx.fillRect(px + 8, py + 10, 16, 16);
        
        // Head (circle)
        ctx.beginPath();
        ctx.arc(px + 16, py + 8, 6, 0, Math.PI * 2);
        ctx.fill();
        
        // Name tag - with padding
        ctx.fillStyle = isMe ? '#fff' : 'rgba(255,255,255,0.75)';
        ctx.font = isMe ? 'bold 9px sans-serif' : '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, px + 16, py + 38);
        
        // Proximity ring
        if (!isMe && me) {
          const dist = Math.sqrt((p.x - me.x)**2 + (p.y - me.y)**2);
          if (dist <= 3) {
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(px + 16, py + 16, 18, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      }
      
      requestAnimationFrame(render);
    }

    // Chat
    document.getElementById('chat-send').addEventListener('click', () => {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (text && connected) {
        send('chat', { text });
        input.value = '';
      }
    });
    
    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('chat-send').click();
      }
      e.stopPropagation(); // Prevent movement keys from triggering
    });

    document.getElementById('join-btn').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim() || 'Player';
      if (connected) send('join', { name });
    });

    connect();
    setInterval(update, 1000/60);
    render();
  </script>
</body>
</html>
